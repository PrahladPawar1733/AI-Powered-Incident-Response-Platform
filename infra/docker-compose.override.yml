services:
  k8s-mcp:
    build:
      context: ..
      dockerfile: services/mcp-servers/k8s/Dockerfile
    ports:
      - "8001:8001"
    env_file:
      - ../.env
    environment:
      - ENVIRONMENT=development
    networks:
      - incident-net

  db-mcp:
    build:
      context: ..
      dockerfile: services/mcp-servers/db/Dockerfile
    ports:
      - "8002:8002"
    env_file:
      - ../.env
    environment:
      - ENVIRONMENT=development
      - POSTGRES_URL=postgresql+asyncpg://agent_user:changeme@postgres:5432/incident_db
    networks:
      - incident-net
    depends_on:
      - postgres

  logs-mcp:
    build:
      context: ..
      dockerfile: services/mcp-servers/logs/Dockerfile
    ports:
      - "8003:8003"
    env_file:
      - ../.env
    environment:
      - ENVIRONMENT=development
    networks:
      - incident-net

  metrics-mcp:
    build:
      context: ..
      dockerfile: services/mcp-servers/metrics/Dockerfile
    ports:
      - "8004:8004"
    env_file:
      - ../.env
    environment:
      - ENVIRONMENT=development
    networks:
      - incident-net

  remediation-mcp:
    build:
      context: ..
      dockerfile: services/mcp-servers/remediation/Dockerfile
    ports:
      - "8005:8005"
    env_file:
      - ../.env
    environment:
      - ENVIRONMENT=development
    networks:
      - incident-net
