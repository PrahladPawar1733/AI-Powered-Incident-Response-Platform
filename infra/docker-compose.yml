

networks:
  incident-net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  grafana_data:


services:

  # ─── Zookeeper ────────────────────────────────────────────────────
  # Kafka's control plane — manages cluster membership, leader election
  # In production you'd run 3 Zookeeper nodes for HA, 1 is fine for dev
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.3
    container_name: zookeeper
    networks: [ incident-net ]
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      ZOOKEEPER_LOG4J_ROOT_LOGLEVEL: WARN
      ZOOKEEPER_4LW_COMMANDS_WHITELIST: "*"
    healthcheck:
      test: [ "CMD", "cub", "zk-ready", "localhost:2181", "10" ]
      interval: 10s
      timeout: 10s
      retries: 10

  # ─── Kafka ────────────────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.5.3
    container_name: kafka
    networks: [ incident-net ]
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092" # internal Docker network
      - "29092:29092" # your local machine
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181

      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:9092,EXTERNAL://localhost:29092
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:9092,EXTERNAL://0.0.0.0:29092

      # Topic defaults
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: 4
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
      KAFKA_MIN_INSYNC_REPLICAS: 1

      # Retention
      KAFKA_LOG_RETENTION_HOURS: 168 # 7 days
      KAFKA_LOG_RETENTION_BYTES: 1073741824 # 1GB per partition

      # Performance
      KAFKA_LOG_SEGMENT_BYTES: 536870912
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_LOG4J_ROOT_LOGLEVEL: WARN
    healthcheck:
      test: [ "CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092" ]
      interval: 15s
      timeout: 10s
      retries: 15
      start_period: 30s

  # ─── Schema Registry ──────────────────────────────────────────────
  # Validates message schemas — prevents services publishing malformed messages
  schema-registry:
    image: confluentinc/cp-schema-registry:7.5.3
    container_name: schema-registry
    networks: [ incident-net ]
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8081:8081"
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: kafka:9092
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
      SCHEMA_REGISTRY_LOG4J_ROOT_LOGLEVEL: WARN

  # ─── Kafka UI ─────────────────────────────────────────────────────
  # Visual interface — see topics, messages, consumer lag in browser
  # Open http://localhost:8080 after docker compose up
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    networks: [ incident-net ]
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      KAFKA_CLUSTERS_0_SCHEMAREGISTRY: http://schema-registry:8081

  # ─── Redis ────────────────────────────────────────────────────────
  # Used for: incident dedup, session state, approval tokens
  redis:
    image: redis:7.2-alpine
    container_name: redis
    networks: [ incident-net ]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: >
      redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru --loglevel warning
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 10

  # ─── Postgres ─────────────────────────────────────────────────────
  # Primary store: incidents, runbooks, audit log, pgvector embeddings
  postgres:
    image: pgvector/pgvector:pg16 # official pgvector image — has extension built in
    container_name: postgres
    networks: [ incident-net ]
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    environment:
      POSTGRES_DB: incident_db
      POSTGRES_USER: agent_user
      POSTGRES_PASSWORD: changeme
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U agent_user -d incident_db" ]
      interval: 5s
      timeout: 3s
      retries: 15

  # ─── Prometheus ───────────────────────────────────────────────────
  # Scrapes metrics from your services, fires alerts into the platform
  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: prometheus
    networks: [ incident-net ]
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml

  # ─── Grafana ──────────────────────────────────────────────────────
  # Dashboards for MTTR, active incidents, agent decisions
  grafana:
    image: grafana/grafana:10.2.0
    container_name: grafana
    networks: [ incident-net ]
    depends_on: [ prometheus, loki ]
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"

  # ─── Loki ───────────────────────────────────────────────────────
  # Log aggregation engine — the logs-mcp queries this via HTTP API
  loki:
    image: grafana/loki:2.9.4
    container_name: loki
    networks: [ incident-net ]
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - ./loki/loki-config.yaml:/etc/loki/local-config.yaml
    healthcheck:
      test: [ "CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3100/ready || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 10

  # ─── Promtail ───────────────────────────────────────────────────
  # Scrapes container logs from Docker and ships them to Loki
  promtail:
    image: grafana/promtail:2.9.4
    container_name: promtail
    networks: [ incident-net ]
    depends_on: [ loki ]
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./loki/promtail-config.yaml:/etc/promtail/config.yaml
    command: -config.file=/etc/promtail/config.yaml
