# Promtail config — scrapes Docker container logs and ships to Loki
server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # Scrape logs from all Docker containers via the Docker socket
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      # Use the container name as the "app" label
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: 'app'
      # Add the container ID
      - source_labels: ['__meta_docker_container_id']
        target_label: 'container_id'
      # Add the Docker image name
      - source_labels: ['__meta_docker_container_image']
        target_label: 'image'
